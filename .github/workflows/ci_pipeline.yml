name : CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Installing test tools
        run: sudo apt-get update && sudo apt-get install -y redis-tools

      - name: Build Docker image
        run: docker build -t mini-db .

      - name: Start database container in background
        run: docker run -d --name mini-db-container -p 8080:8080 mini-db

      - name: Wait for database health check
        run: |
          for i in {1..5}; do
            # Send PING. If we get PONG back, the server is ready!
            if redis-cli -h 127.0.0.1 -p 8080 PING | grep -q "PONG"; then
              echo "Database is online and accepting connections!"
              exit 0
            fi
            echo "Waiting for database..."
            sleep 1
          done
          echo "Error: Database failed to start after 5 attempts."
          exit 1

      - name: Run benchmark test
        run: redis-benchmark -h 127.0.0.1 -p 8080 -t set,get -n 20000 -q

      - name: Stop the container
        if: always()
        run: docker stop mini-db-container && docker rm mini-db-container